name: Test npm Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  wait-for-npm:
    name: Wait for npm packages
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm propagation
        run: |
          echo "Waiting 60 seconds for npm packages to propagate..."
          sleep 60

  test-linux:
    name: Test Linux (npx)
    needs: wait-for-npm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: sshifu
            cmd: sshifu -v
          - package: sshifu-server
            cmd: sshifu-server -v
          - package: sshifu-trust
            cmd: sshifu-trust -v
    steps:
      - name: Test ${{ matrix.package }}
        run: |
          npx -y ${{ matrix.package }} -v

  test-linux-alpine:
    name: Test Alpine Linux (podman)
    needs: wait-for-npm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: sshifu
            cmd: sshifu -v
          - package: sshifu-server
            cmd: sshifu-server -v
          - package: sshifu-trust
            cmd: sshifu-trust -v
    steps:
      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Test ${{ matrix.package }} in Alpine
        run: |
          podman run --rm node:alpine npx -y ${{ matrix.package }} -v

  test-macos:
    name: Test macOS
    needs: wait-for-npm
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - package: sshifu
            cmd: sshifu -v
          - package: sshifu-server
            cmd: sshifu-server -v
          - package: sshifu-trust
            cmd: sshifu-trust -v
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clear npm and npx cache
        run: |
          npm cache clean --force
          rm -rf ~/Library/Caches/npm/_npx

      - name: Install ${{ matrix.package }} with verbose output
        run: npm install -g ${{ matrix.package }}@latest --verbose

      - name: Test ${{ matrix.package }}
        run: ${{ matrix.cmd }}

  test-windows:
    name: Test Windows
    needs: wait-for-npm
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - package: sshifu
            cmd: sshifu -v
          - package: sshifu-server
            cmd: sshifu-server -v
          - package: sshifu-trust
            cmd: sshifu-trust -v
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clear all npm caches
        run: |
          npm cache clean --force
          Remove-Item -Recurse -Force $env:LOCALAPPDATA\npm-cache\_npx -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $env:LOCALAPPDATA\npm-cache\_logs -ErrorAction SilentlyContinue

      - name: Install ${{ matrix.package }} with verbose output
        run: npm install -g ${{ matrix.package }}@latest --verbose --force 2>&1 | Out-Host

      - name: List installed package contents
        run: |
          $pkgPath = npm root -g | Join-Path -ChildPath ${{ matrix.package }}
          Write-Host "Package path: $pkgPath"
          Get-ChildItem -Recurse $pkgPath | Select-Object FullName
        shell: pwsh

      - name: Test ${{ matrix.package }}
        run: ${{ matrix.cmd }}

  test-arm-emulated:
    name: Test ARM (QEMU)
    needs: wait-for-npm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            image: arm64v8/node:alpine
          - arch: arm
            image: arm32v7/node:alpine
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Test sshifu-server (${{ matrix.arch }})
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} ${{ matrix.image }} npx -y sshifu-server -v

      - name: Test sshifu (${{ matrix.arch }})
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} ${{ matrix.image }} npx -y sshifu -v

      - name: Test sshifu-trust (${{ matrix.arch }})
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} ${{ matrix.image }} npx -y sshifu-trust -v
