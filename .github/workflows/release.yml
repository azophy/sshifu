name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: arm
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -o dist/sshifu${{ matrix.ext }} ./cmd/sshifu
          go build -o dist/sshifu-server${{ matrix.ext }} ./cmd/sshifu-server
          go build -o dist/sshifu-trust${{ matrix.ext }} ./cmd/sshifu-trust

      - name: Create archive
        id: archive
        run: |
          cd dist
          ARCHIVE_NAME="sshifu-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            7z a -tzip "${ARCHIVE_NAME}.zip" *
            echo "archive_name=${ARCHIVE_NAME}.zip" >> $GITHUB_OUTPUT
          else
            tar -czvf "${ARCHIVE_NAME}.tar.gz" *
            echo "archive_name=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.archive.outputs.archive_name }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Remove leading 'v' if present
          VERSION="${VERSION#v}"
          # Normalize to semver (ensure X.Y.Z format)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          elif [[ "$VERSION" =~ ^[0-9]+$ ]]; then
            VERSION="${VERSION}.0.0"
          fi
          jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to npm
        run: npm publish --access public --provenance
