name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.binary }} (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [sshifu, sshifu-server, sshifu-trust]
        os: [linux, darwin, windows]
        arch: [amd64, arm64, arm]
        exclude:
          - os: windows
            arch: arm64
          - os: windows
            arch: arm
          - os: darwin
            arch: arm
        ext: [""]
        include:
          - os: windows
            arch: amd64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          mkdir -p dist
          go build -ldflags "-X main.version=$VERSION" -o dist/${{ matrix.binary }}${{ matrix.ext }} ./cmd/${{ matrix.binary }}

      - name: Create archive
        id: archive
        run: |
          cd dist
          ARCHIVE_NAME="${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            7z a -tzip "${ARCHIVE_NAME}.zip" ${{ matrix.binary }}${{ matrix.ext }}
            echo "archive_name=${ARCHIVE_NAME}.zip" >> $GITHUB_OUTPUT
          else
            tar -czvf "${ARCHIVE_NAME}.tar.gz" ${{ matrix.binary }}${{ matrix.ext }}
            echo "archive_name=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: dist/${{ steps.archive.outputs.archive_name }}
          retention-days: 1

  upload-release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*

  publish-npm:
    name: Publish to npm
    needs: upload-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync workspace versions
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          node scripts/sync-version.js "$VERSION"

      - name: Publish workspace packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspaces --access public
