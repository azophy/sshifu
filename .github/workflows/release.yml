name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build sshifu
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o dist/sshifu-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/sshifu

      - name: Build sshifu-server
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o dist/sshifu-server-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/sshifu-server

      - name: Build sshifu-trust
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o dist/sshifu-trust-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/sshifu-trust

      - name: Create archive
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r sshifu-${{ matrix.os }}-${{ matrix.arch }}.zip *.exe
          else
            tar -czvf sshifu-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *
          fi

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sshifu-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.zip' || '.tar.gz' }}
