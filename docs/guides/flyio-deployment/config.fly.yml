# Sshifu Server Configuration for Fly.io
# Copy this to config.fly.yml and update public_url
# OAuth credentials are loaded from environment variables (Fly.io secrets)

server:
  listen: ":8080"
  public_url: https://sshifu-auth.fly.dev

ca:
  private_key: ./ca
  public_key: ./ca.pub

cert:
  ttl: 8h
  extensions:
    permit-pty: true
    permit-port-forwarding: true
    permit-agent-forwarding: true
    permit-x11-forwarding: true

auth:
  providers:
    - name: github
      type: github
      client_id: ${GITHUB_CLIENT_ID}
      client_secret: ${GITHUB_CLIENT_SECRET}
      allowed_org: ${GITHUB_ALLOWED_ORG}
